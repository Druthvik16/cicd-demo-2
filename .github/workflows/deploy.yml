name: CI/CD Pipeline - Two Branch Strategy

on:
  push:
    branches:
      - main
      - frontend
      - backend

jobs:

  # JOB 1 — Detect which branch was pushed
  detect-branch:
    name: Detect Branch
    runs-on: ubuntu-latest
    outputs:
      is_frontend: ${{ steps.check.outputs.is_frontend }}
      is_backend: ${{ steps.check.outputs.is_backend }}
      is_main: ${{ steps.check.outputs.is_main }}
    steps:
      - name: Check branch
        id: check
        run: |
          BRANCH="${{ github.ref_name }}"
          echo "Branch pushed: $BRANCH"

          if [ "$BRANCH" = "frontend" ]; then
            echo "is_frontend=true" >> $GITHUB_OUTPUT
            echo "is_backend=false" >> $GITHUB_OUTPUT
            echo "is_main=false" >> $GITHUB_OUTPUT
          elif [ "$BRANCH" = "backend" ]; then
            echo "is_frontend=false" >> $GITHUB_OUTPUT
            echo "is_backend=true" >> $GITHUB_OUTPUT
            echo "is_main=false" >> $GITHUB_OUTPUT
          else
            echo "is_frontend=true" >> $GITHUB_OUTPUT
            echo "is_backend=true" >> $GITHUB_OUTPUT
            echo "is_main=true" >> $GITHUB_OUTPUT
          fi

  # JOB 2 — Build Angular (frontend or main branch)
  build-frontend:
    name: Build Angular
    runs-on: ubuntu-latest
    needs: detect-branch
    if: |
      needs.detect-branch.outputs.is_frontend == 'true'
    steps:
      - name: Checkout frontend branch
        uses: actions/checkout@v4
        with:
          ref: frontend

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install and build
        working-directory: frontend
        run: |
          npm ci
          npm run build -- --configuration development

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: angular-build
          path: frontend/dist/frontend/browser/
          retention-days: 1

  # JOB 3 — Deploy Frontend Only
  deploy-frontend-only:
    name: Deploy Frontend Only
    runs-on: ubuntu-latest
    needs: [detect-branch, build-frontend]
    if: |
      needs.detect-branch.outputs.is_frontend == 'true' &&
      needs.detect-branch.outputs.is_backend == 'false' &&
      needs.build-frontend.result == 'success'
    steps:
      - name: Download Angular build
        uses: actions/download-artifact@v4
        with:
          name: angular-build
          path: angular-build-output/

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "$EC2_SSH_KEY" > ~/.ssh/key.pem
          chmod 600 ~/.ssh/key.pem
          ssh-keyscan -t rsa,ed25519 $EC2_HOST >> ~/.ssh/known_hosts 2>/dev/null || true
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}

      - name: Copy build and restart
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
        run: |
          ssh -i ~/.ssh/key.pem -o StrictHostKeyChecking=no $EC2_USER@$EC2_HOST \
            "rm -rf ~/app/backend/public/* && mkdir -p ~/app/backend/public"
          scp -i ~/.ssh/key.pem -o StrictHostKeyChecking=no -r angular-build-output/* \
            $EC2_USER@$EC2_HOST:~/app/backend/public/
          ssh -i ~/.ssh/key.pem -o StrictHostKeyChecking=no $EC2_USER@$EC2_HOST \
            "cd ~/app/backend && pm2 restart crud-app && echo Frontend deployed!"

  # JOB 4 — Deploy Backend Only
  deploy-backend-only:
    name: Deploy Backend Only
    runs-on: ubuntu-latest
    needs: detect-branch
    if: |
      needs.detect-branch.outputs.is_backend == 'true' &&
      needs.detect-branch.outputs.is_frontend == 'false'
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "$EC2_SSH_KEY" > ~/.ssh/key.pem
          chmod 600 ~/.ssh/key.pem
          ssh-keyscan -t rsa,ed25519 $EC2_HOST >> ~/.ssh/known_hosts 2>/dev/null || true
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}

      - name: Deploy backend on EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
        run: |
          ssh -i ~/.ssh/key.pem -o StrictHostKeyChecking=no $EC2_USER@$EC2_HOST << 'ENDSSH'
            set -e
            echo "=== Backend only deploy ==="
            cd ~/app/backend
            git fetch origin backend
            git checkout backend
            git pull origin backend
            npm install --production
            npx prisma generate
            npx prisma migrate deploy
            if pm2 list | grep -q "crud-app"; then
              pm2 restart crud-app
            else
              pm2 start dist/main.js --name crud-app
              pm2 save
            fi
            echo "=== Backend deploy done ==="
          ENDSSH

      - name: Health check
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
        run: |
          sleep 10
          curl --fail --silent http://$EC2_HOST:3000/api/health \
            | grep '"success":true' && echo "Backend healthy!" || echo "Check PM2 logs"

  # JOB 5 — Deploy Both (main branch)
  deploy-both:
    name: Deploy Frontend + Backend
    runs-on: ubuntu-latest
    needs: [detect-branch, build-frontend]
    if: |
      needs.detect-branch.outputs.is_main == 'true' &&
      needs.build-frontend.result == 'success'
    steps:
      - name: Download Angular build
        uses: actions/download-artifact@v4
        with:
          name: angular-build
          path: angular-build-output/

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "$EC2_SSH_KEY" > ~/.ssh/key.pem
          chmod 600 ~/.ssh/key.pem
          ssh-keyscan -t rsa,ed25519 $EC2_HOST >> ~/.ssh/known_hosts 2>/dev/null || true
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}

      - name: Deploy everything on EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
        run: |
          ssh -i ~/.ssh/key.pem -o StrictHostKeyChecking=no $EC2_USER@$EC2_HOST \
            "rm -rf ~/app/backend/public/* && mkdir -p ~/app/backend/public"
          scp -i ~/.ssh/key.pem -o StrictHostKeyChecking=no -r angular-build-output/* \
            $EC2_USER@$EC2_HOST:~/app/backend/public/
          ssh -i ~/.ssh/key.pem -o StrictHostKeyChecking=no $EC2_USER@$EC2_HOST << 'ENDSSH'
            set -e
            cd ~/app/backend
            git fetch origin backend
            git checkout backend
            git pull origin backend
            npm install --production
            npx prisma generate
            npx prisma migrate deploy
            if pm2 list | grep -q "crud-app"; then
              pm2 restart crud-app
            else
              pm2 start dist/main.js --name crud-app
              pm2 save
            fi
            echo "=== Full deploy done ==="
          ENDSSH

      - name: Health check
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
        run: |
          sleep 10
          curl --fail --silent http://$EC2_HOST:3000/api/health \
            | grep '"success":true' && echo "App healthy!" || echo "Check PM2 logs"